name: Instagram Cloud Uploader

on:
  schedule:
    - cron: '0 * * * *' # Runs at minute 0 of every hour
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  upload-to-instagram:
    runs-on: ubuntu-latest
    
    # Needs permission to commit back to the repo
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install instagrapi pytz

    - name: Run Cloud Uploader
      run: |
        python cloud_uploader.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        # Check if there are any changes (like deleted videos or updated last_upload.txt)
        if git diff-index --quiet HEAD --; then
          echo "No changes to commit"
        else
          git commit -m "Auto-removed uploaded video from queue"
          git push
        fi
